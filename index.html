<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NJDC 2026 — Nodben Joski Duo Cup | Турнир 2×2 CS2</title>
    <meta name="description" content="NJDC 2026 (Nodben Joski Duo Cup) — турнир 2×2 по Counter-Strike 2 на сервере «Нодбин Жоски» через платформу CYBERSHOKE. Составы команд, турнирная сетка, матчи, ставки зрителей и таблица лидеров." />
    <meta property="og:title" content="NJDC 2026 — Nodben Joski Duo Cup" />
    <meta property="og:description" content="Турнир 2×2 по Counter-Strike 2 на сервере «Нодбин Жоски». 6 команд, 5 этапов, Гранд-финал." />
    <meta property="og:image" content="/images/hero-bg.jpg" />
    <link rel="icon" href="/logos/team-f.png" type="image/png" />
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Инлайн-скрипт: перехватывает ссылки из писем Supabase (recovery, signup,
      // magic_link), сохраняет токены в sessionStorage и перенаправляет на
      // /reset-password, где React-страница обработает их.
      // Это нужно, потому что HashRouter «съедает» хеш с токенами.
      (function () {
        var hash = window.location.hash || "";
        if (
          hash.indexOf("type=recovery") !== -1 ||
          hash.indexOf("type=signup") !== -1 ||
          hash.indexOf("type=magic_link") !== -1 ||
          (hash.indexOf("access_token=") !== -1 && hash.indexOf("type=") !== -1)
        ) {
          sessionStorage.setItem("njdc_supabase_auth_hash", hash);
          window.location.hash = "/reset-password";
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
